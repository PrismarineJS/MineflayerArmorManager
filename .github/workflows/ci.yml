name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "npm"
      - run: npm install
      - run: npm test
      - run: npm run format:check
      - run: npm run lint
